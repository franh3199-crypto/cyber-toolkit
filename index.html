<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Título y descripción -->
    <title>Cyber Toolkit | Repositorio de Comandos de Seguridad</title>
    <meta name="description" content="Tu arsenal personal de comandos y snippets para ciberseguridad. Organiza, busca y copia herramientas de pentesting al instante." />
    <meta name="keywords" content="ciberseguridad, pentesting, comandos, nmap, hacking ético, toolkit" />
    
    <!-- Color del tema para móviles -->
    <meta name="theme-color" content="#0b0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CDN (para desarrollo rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de Tailwind -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Menlo', 'monospace'],
            },
            colors: {
              slate: {
                950: '#0b0e14',
                900: '#161b22',
                850: '#1c2128',
                800: '#21262d',
                750: '#2d333b',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- Estilos adicionales -->
    <style>
      /* Scrollbar personalizada */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b0e14;
      }
      ::-webkit-scrollbar-thumb {
        background: #2d333b;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3d444d;
      }
      
      /* Selección de texto */
      ::selection {
        background: rgba(8, 145, 178, 0.3);
        color: #22d3ee;
      }
      
      /* Smooth scroll */
      html {
        scroll-behavior: smooth;
      }
      
      /* Focus visible */
      *:focus-visible {
        outline: 2px solid #0891b2;
        outline-offset: 2px;
      }
      
      /* Animación de entrada para elementos */
      .animate-enter {
        animation: slideUp 0.4s ease-out forwards;
      }
      
      /* Glassmorphism sutil */
      .glass {
        background: rgba(22, 27, 34, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
    
    <!-- Icono SVG inline (data URI) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230891b2'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E🛡️%3C/text%3E%3C/svg%3E" />
  </head>
  
  <body class="bg-[#0b0e14] text-slate-300 font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-400">

      <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl"></div>
      <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%231c2128\' fill-opacity=\'0.4\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-20"></div>
    </div>

    <!-- Root para React -->
    <div id="root" class="relative z-10"></div>

    <!-- Script de Vite (en desarrollo) o tu build -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Fallback si no hay JS -->
    <noscript>

</html>
